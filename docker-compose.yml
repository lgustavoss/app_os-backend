services:
  db:
    image: postgres:15-alpine
    container_name: app_os_db
    environment:
      POSTGRES_DB: ${DB_NAME:-app_os}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Sem ports: o banco fica só na rede do Compose (evita expor 5432 sem necessidade).
    # Para pgAdmin local: veja docker-compose.override.example.yml
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Apenas desenvolvimento — em produção use o Dockerfile com Gunicorn (ver documentação de deploy).
  web:
    build: .
    container_name: app_os_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432

volumes:
  postgres_data:

